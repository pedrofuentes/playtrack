<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#080b0f">
    <title>Page not found — PlayTrack</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      main { min-height: 100svh; display: grid; place-items: center; padding: 2rem; text-align: center; }
      .not-found { max-width: 630px; }
      .not-found img { width: 220px; margin: 0 auto 3rem; }
      .not-found h1 { margin-bottom: 1.2rem; }
      .not-found p { color: var(--muted); line-height: 1.7; }
      .not-found .button { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <div class="not-found">
        <img src="assets/playtrack-lockup.svg" alt="PlayTrack">
        <p class="eyebrow">404 · Out of frame</p>
        <h1>That page left the track.</h1>
        <p>The requested path is not part of the PlayTrack site.</p>
        <a class="button primary" href="./">Return to PlayTrack</a>
      </div>
    </main>
  </body>
</html>
